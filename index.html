<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IlliniCare · Mental Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sage:        #8A9E88;
      --sage-mid:    #A8B8A5;
      --sage-light:  #C5D0C2;
      --cream:       #EBE6DC;
      --stone:       #C8BEB0;
      /* text tokens — near-black for 4.5:1 contrast (WCAG AA) */
      --deep:        #111110;
      --deep-80:     rgba(15,15,12,0.88);
      --deep-60:     rgba(15,15,12,0.72);
      --deep-40:     rgba(15,15,12,0.52);
      --deep-20:     rgba(15,15,12,0.20);
      /* glass tokens */
      --glass:       rgba(255,255,255,0.52);
      --glass-mid:   rgba(255,255,255,0.64);
      --glass-hi:    rgba(255,255,255,0.76);
      --glass-bdr:   rgba(255,255,255,0.55);
      --orange:      #C85000;
      --r:           24px;
      --display:     'Cormorant Garamond', Georgia, serif;
      --body:        'Jost', system-ui, sans-serif;
    }

    html {
      width: 100%; height: 100%;
    }

    body {
      width: 100%; min-height: 100%;
      background: linear-gradient(160deg, #D8DDD4 0%, #C8D0C4 50%, #B8C8CC 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      padding: 24px 0;
    }

    /* ── PHONE FRAME ── */
    .phone {
      width: 390px; height: 844px;
      flex-shrink: 0;
      position: relative; overflow: hidden;
      border-radius: 52px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 0 11px #1A1A18,
        0 0 0 12px rgba(255,255,255,0.08),
        0 40px 90px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    @media (max-width: 450px) {
      body { padding: 0; overflow: hidden; height: 100vh; }
      .phone {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ── VIDEO BACKGROUND ── */
    .video-bg {
      position: absolute; inset: 0; z-index: 0;
      overflow: hidden;
      /* gradient fallback shown instantly while video loads or if blocked */
      background: linear-gradient(170deg,
        #f5c5b0 0%, #f0b8a8 15%, #e8c4b8 30%,
        #d4cfe8 50%, #bfd0e8 65%,
        #ccd8e8 80%, #d8e4ec 100%);
    }
    .video-bg video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* show the top of the video — where the pink sunset horizon lives */
      object-position: center 20%;
      /* let the warm sunset tones breathe */
      filter: saturate(0.95) brightness(1.04);
    }
    /* fade cards into the sky — bottom-heavy overlay only */
    .video-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        transparent 52%,
        rgba(230,228,224,0.30) 72%,
        rgba(224,222,218,0.50) 100%
      );
      pointer-events: none;
    }

    /* open-sky spacer — tuned so everything fits without scroll */
    .sky-spacer { height: 52px; }

    /* ── APP SHELL ── */
    .shell {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      flex-shrink: 0;
      padding: 14px 28px 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .status-time { font-weight: 600; font-size: 15px; color: rgba(44,42,36,0.80); letter-spacing: -.3px; }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    /* ── SCREEN CONTAINER ── */
    .screens { flex: 1; position: relative; overflow: hidden; }

    /* ── SCREEN (default scrollable) ── */
    .screen {
      position: absolute; inset: 0;
      overflow-y: auto; overflow-x: hidden;
      padding-bottom: 96px;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }
    /* home screen: no scroll, fits the full frame */
    .screen-home {
      overflow: hidden;
      padding-bottom: 0;
      display: flex; flex-direction: column;
    }

    /* ── SCREEN (chat layout — flex column, no outer scroll) ── */
    .screen-chat {
      position: absolute; top: 0; left: 0; right: 0; bottom: 72px;
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── GLASS CARDS — true frosted glass, lower opacity = more blur visible ── */
    .glass {
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.60);
      backdrop-filter: blur(48px) saturate(140%);
      -webkit-backdrop-filter: blur(48px) saturate(140%);
      border-radius: var(--r);
      box-shadow: 0 2px 12px rgba(44,42,36,0.06), 0 10px 40px rgba(44,42,36,0.08);
    }
    .glass-hi {
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(255,255,255,0.70);
      backdrop-filter: blur(56px) saturate(150%);
      -webkit-backdrop-filter: blur(56px) saturate(150%);
      border-radius: var(--r);
      box-shadow: 0 2px 16px rgba(44,42,36,0.07), 0 12px 48px rgba(44,42,36,0.09);
    }

    /* ── BOTTOM NAV — floating pill ── */
    .bottom-nav {
      position: absolute; bottom: 18px; left: 18px; right: 18px;
      height: 62px;
      background: rgba(245,242,236,0.90);
      border: none;
      backdrop-filter: blur(40px) saturate(130%);
      -webkit-backdrop-filter: blur(40px) saturate(130%);
      border-radius: 32px;
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 10px;
      z-index: 100;
      box-shadow:
        0 2px 8px rgba(44,42,36,0.08),
        0 8px 32px rgba(44,42,36,0.12),
        inset 0 1px 0 rgba(255,255,255,0.70);
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 8px; cursor: pointer;
      border-radius: 20px; border: none; background: none;
      transition: all .22s ease;
      min-width: 52px;
    }
    .nav-btn.active { background: rgba(44,42,36,0.08); }
    .nav-emoji {
      font-size: 19px; line-height: 1;
      filter: grayscale(0.4) opacity(0.4);
      transition: filter .22s, transform .22s;
    }
    .nav-btn.active .nav-emoji {
      filter: grayscale(0) opacity(1);
      transform: scale(1.10);
    }
    .nav-label {
      font-size: 9px; font-weight: 500; letter-spacing: .2px;
      color: rgba(44,42,36,0.35); transition: color .22s;
    }
    .nav-btn.active .nav-label { color: rgba(44,42,36,0.82); }
    /* active dot indicator */
    .nav-btn.active .nav-label {
      position: relative;
    }
    .nav-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(44,42,36,0.55);
      margin: 0 auto; margin-top: 2px;
      opacity: 0; transition: opacity .22s;
    }
    .nav-btn.active .nav-dot { opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp   { from { transform: translateY(18px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes slideUp  { from { transform: translateY(100%); } to { transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes typeBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    .fade-up { animation: fadeUp .45s ease-out both; }
    .d1 { animation-delay: .06s; } .d2 { animation-delay: .12s; }
    .d3 { animation-delay: .18s; } .d4 { animation-delay: .24s; }
    .d5 { animation-delay: .30s; } .d6 { animation-delay: .36s; }

    /* ── HOME ── */
    .home-header {
      padding: 18px 26px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .avatar-wrap { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.72);
      border: none;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      box-shadow: 0 2px 16px rgba(44,42,36,0.12);
    }
    /* streak pill */
    .streak-badge {
      padding: 5px 11px; border-radius: 18px;
      background: rgba(255,190,60,0.18); border: 1px solid rgba(255,170,40,0.28);
      font-size: 12px; font-weight: 600; color: rgba(44,38,10,0.80);
      display: flex; align-items: center; gap: 3px; letter-spacing: .1px;
    }

    .greet-sub  {
      font-size: 11px; color: var(--deep-40); font-weight: 400;
      letter-spacing: .3px; margin-bottom: 2px;
    }
    .greet-name { font-family: var(--display); font-size: 22px; font-weight: 600; color: var(--deep); line-height: 1.2; letter-spacing: -.2px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .menu-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.62); border: none;
      backdrop-filter: blur(20px);
      box-shadow: 0 2px 12px rgba(44,42,36,0.10);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* (sky-spacer defined in grain section above) */

    .daily-thought { padding: 0 28px 20px; }
    .thought-label {
      font-size: 11px; font-weight: 500; letter-spacing: .8px;
      text-transform: uppercase;
      color: rgba(44,42,36,0.42); margin-bottom: 8px;
    }
    .thought-quote {
      font-family: var(--display);
      font-size: 42px; font-weight: 600;
      color: var(--deep); line-height: 1.08; letter-spacing: -.3px;
    }

    /* condition card */
    .cond-card   { margin: 0 22px 2px; padding: 10px 16px 8px; }
    .cond-head   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cond-title  { font-size: 10.5px; font-weight: 600; color: var(--deep-40);
                   letter-spacing: .8px; text-transform: uppercase; }
    .toggle-grp  { display: flex; background: rgba(44,42,36,0.06); border-radius: 22px; padding: 3px; }
    .tog {
      padding: 5px 14px; border-radius: 18px; font-size: 11px; font-weight: 500;
      border: none; cursor: pointer; color: var(--deep-40); background: transparent;
      font-family: var(--body); transition: all .22s;
    }
    .tog.on { background: rgba(255,255,255,0.88); color: var(--deep);
              box-shadow: 0 1px 8px rgba(44,42,36,0.10); }
    .cond-body   { display: flex; gap: 18px; align-items: flex-start; }
    .cond-date   {
      text-align: center; min-width: 44px;
      padding-right: 16px;
      border-right: 1px solid rgba(44,42,36,0.08);
    }
    .cond-day    { font-family: var(--display); font-size: 40px; font-weight: 300;
                   color: var(--deep); line-height: 1; }
    .cond-month  { font-size: 10px; color: var(--deep-40); font-weight: 600;
                   text-transform: uppercase; letter-spacing: .6px; margin-top: 2px; }
    .cond-text   { flex: 1; font-size: 12px; line-height: 1.65; color: var(--deep-60); }
    /* soft pill CTA */
    .sol-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 7px 16px;
      background: rgba(44,42,36,0.06); color: var(--deep-60);
      border: none; border-radius: 22px; font-family: var(--body);
      font-size: 12px; font-weight: 500; letter-spacing: .2px;
      cursor: pointer; transition: background .22s;
    }
    .sol-btn::after { content: '→'; font-size: 13px; color: var(--deep-40); }
    .sol-btn:hover { background: rgba(44,42,36,0.11); }

    /* ── ESSENTIALS SECTION ── */
    .essentials-wrap {
      padding: 6px 18px 100px;
      display: flex; flex-direction: column;
    }
    .essentials-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .essentials-title {
      font-family: var(--display);
      font-size: 18px; font-weight: 600;
      color: var(--deep); letter-spacing: -.2px;
    }
    .essentials-more {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: rgba(44,42,36,0.07);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--deep);
    }
    .feats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .feat-card {
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.72);
      backdrop-filter: blur(48px) saturate(130%);
      -webkit-backdrop-filter: blur(48px) saturate(130%);
      border-radius: 22px;
      padding: 18px 16px 16px;
      box-shadow: 0 2px 10px rgba(44,42,36,0.05), 0 8px 28px rgba(44,42,36,0.07);
      cursor: pointer; transition: transform .20s ease, box-shadow .20s ease;
      display: flex; flex-direction: column;
      justify-content: space-between;
      min-height: 158px;
      overflow: hidden;
      position: relative;
    }
    .feat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(44,42,36,0.09), 0 14px 40px rgba(44,42,36,0.10); }
    .feat-card:active { transform: scale(.97); }
    /* card top: title + desc */
    .feat-card-top { flex: 1; }
    .feat-card-name {
      font-family: var(--display);
      font-size: 20px; font-weight: 600;
      color: var(--deep); line-height: 1.18;
      letter-spacing: -.2px; margin-bottom: 6px;
    }
    .feat-card-desc {
      font-size: 11.5px; font-weight: 400;
      color: rgba(44,42,36,0.50); line-height: 1.48;
    }
    /* card bottom: arrow left, illustration right */
    .feat-card-footer {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-top: 14px;
    }
    .feat-arrow {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: rgba(44,42,36,0.09);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--deep); line-height: 1;
      flex-shrink: 0;
    }
    .feat-illus {
      font-size: 44px; line-height: 1;
      opacity: 0.55; margin-bottom: -4px;
      filter: saturate(0.6);
    }

    /* ── MOOD CHECK-IN ── */
    .sheet-overlay {
      position: absolute; inset: 0; z-index: 200;
      background: rgba(0,0,0,.35); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
    }
    .sheet {
      width: 100%; padding: 20px 28px 48px;
      border-radius: 32px 32px 0 0;
      background: rgba(242,240,236,0.97);
      border-top: none;
      box-shadow: 0 -4px 32px rgba(44,42,36,0.10);
      animation: slideUp .38s cubic-bezier(.32,.72,0,1);
    }
    .sheet-handle { width: 36px; height: 4px; background: rgba(40,38,30,.2); border-radius: 2px; margin: 0 auto 20px; }
    .sheet-title  { font-family: var(--display); font-size: 28px; font-weight: 400; color: var(--deep); margin-bottom: 4px; }
    .sheet-sub    { font-size: 12px; color: var(--deep-60); margin-bottom: 22px; }

    .mood-row   { display: flex; justify-content: space-between; margin-bottom: 22px; }
    .mood-opt   {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 10px 6px; border-radius: 16px; border: 2px solid transparent;
      cursor: pointer; background: transparent; transition: all .2s; min-width: 56px;
    }
    .mood-opt.sel { background: rgba(255,255,255,.52); border-color: rgba(255,255,255,.82); }
    .m-emoji { font-size: 28px; }
    .m-label { font-size: 10px; font-weight: 500; color: var(--deep-60); }

    .tags-lbl  { font-size: 11px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--deep-40); margin-bottom: 9px; }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
    .tag-pill  {
      padding: 6px 13px; border-radius: 20px;
      border: 1px solid rgba(40,38,30,.2); background: transparent;
      font-family: var(--body); font-size: 12px; color: var(--deep-60);
      cursor: pointer; transition: all .2s;
    }
    .tag-pill.on { background: rgba(36,34,26,.74); border-color: transparent; color: rgba(255,255,255,.92); }

    .note-ta {
      width: 100%; background: rgba(255,255,255,.34);
      border: 1px solid rgba(255,255,255,.52); border-radius: 14px;
      padding: 11px 14px; font-family: var(--body); font-size: 13px;
      color: var(--deep); resize: none; outline: none; margin-bottom: 18px;
    }
    .note-ta::placeholder { color: var(--deep-40); }

    .primary-btn {
      width: 100%; padding: 16px;
      background: rgba(44,42,36,0.78); color: rgba(255,255,255,.94);
      border: none; border-radius: 20px; font-family: var(--body);
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all .2s;
      letter-spacing: .2px;
    }
    .primary-btn:hover { background: rgba(44,42,36,0.90); }

    /* ── GENERIC HEADER ── */
    .scr-header { padding: 18px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .scr-title  { font-family: var(--display); font-size: 30px; font-weight: 400; color: var(--deep); }
    .back-btn   {
      width: 36px; height: 36px; border-radius: 12px;
      background: var(--glass-mid); border: 1px solid var(--glass-bdr);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .chat-head-title { flex: 1; margin-left: 12px; }
    .cht-main { font-size: 16px; font-weight: 600; color: var(--deep); }
    .cht-sub  { font-size: 11px; color: var(--deep-60); }

    /* ── INSIGHTS ── */
    .stats-row { display: flex; gap: 10px; padding: 0 24px; margin: 14px 0 0; }
    .stat-card { flex: 1; padding: 14px; text-align: center; }
    .stat-num  { font-family: var(--display); font-size: 32px; font-weight: 400; color: var(--deep); line-height: 1; }
    .stat-lbl  { font-size: 10px; font-weight: 500; color: var(--deep-60); margin-top: 3px; letter-spacing: .2px; }

    .chart-card { margin: 14px 24px; padding: 16px; }
    .chart-sub  { font-size: 11px; color: var(--deep-60); margin-bottom: 12px; font-weight: 500; letter-spacing: .2px; }

    /* ── MOOD CALENDAR ── */
    .cal-card   { margin: 14px 24px; padding: 16px 14px 14px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title  { font-size: 13px; font-weight: 600; color: var(--deep); }
    .cal-count  { font-size: 11px; color: var(--deep-60); }
    .cal-plus   { width: 28px; height: 28px; border-radius: 50%; background: rgba(44,42,36,0.10);
                  border: none; cursor: pointer; font-size: 16px; color: var(--deep);
                  display: flex; align-items: center; justify-content: center; }
    .cal-dow    { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .cal-dow span { text-align: center; font-size: 10px; font-weight: 600; color: var(--deep-40);
                    letter-spacing: .3px; padding: 2px 0; }
    .cal-grid   { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell   { aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
                  border-radius: 50%; font-size: 11px; color: rgba(44,42,36,0.35); font-weight: 600;
                  position: relative; cursor: default; }
    .cal-cell.today { background: rgba(44,42,36,0.12); box-shadow: 0 0 0 2.5px rgba(44,42,36,0.70); }
    .cal-cell.has-entry { font-size: 22px; color: rgba(0,0,0,1); }
    .cal-cell.today.has-entry { box-shadow: 0 0 0 2.5px rgba(44,42,36,0.80); }
    .cal-cell.empty { opacity: 0; pointer-events: none; }
    .cal-cell.has-entry { cursor: pointer; transition: transform .15s; }
    .cal-cell.has-entry:active { transform: scale(0.85); }
    .cal-cell.selected { box-shadow: 0 0 0 2.5px var(--deep); background: rgba(44,42,36,0.08); }

    /* ── DAY DETAIL CARD ── */
    .day-detail {
      margin: 10px 0 0; padding: 12px 14px;
      background: rgba(255,255,255,0.55); border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.65);
      display: flex; align-items: center; gap: 14px;
      animation: fadeUp .25s ease both;
    }
    .day-detail-emoji { font-size: 32px; flex-shrink: 0; }
    .day-detail-info  { flex: 1; }
    .day-detail-date  { font-size: 11px; color: var(--deep-40); font-weight: 600; letter-spacing: .3px; }
    .day-detail-label { font-size: 16px; font-weight: 600; color: var(--deep); margin: 2px 0; }
    .day-detail-tags  { font-size: 11px; color: var(--deep-60); }
    .day-detail-note  { font-size: 11px; color: var(--deep-60); font-style: italic; margin-top: 3px; }

    .sec-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--deep-40); padding: 14px 24px 6px; }

    .history-list { padding: 0 24px; display: flex; flex-direction: column; gap: 9px; }
    .hist-row { display: flex; align-items: center; gap: 14px; padding: 12px 15px; }

    /* ─── VIDEO BACKGROUND COMPONENT ────────────────────────────────────── */
    function VideoBg() {
      const vidRef = useRef(null);

      useEffect(() => {
        const v = vidRef.current; if (!v) return;

        const tryPlay = () => { v.play().catch(() => {}); };

        // Attempt autoplay immediately
        tryPlay();

        // Retry on first user interaction (needed for WeChat / iOS WebView)
        const onTouch = () => { tryPlay(); document.removeEventListener('touchstart', onTouch); document.removeEventListener('click', onTouch); };
        document.addEventListener('touchstart', onTouch, { once: true, passive: true });
        document.addEventListener('click',      onTouch, { once: true });

        return () => {
          document.removeEventListener('touchstart', onTouch);
          document.removeEventListener('click', onTouch);
        };
      }, []);

      return (
        <div className="video-bg">
          <video
            ref={vidRef}
            src="bg2.mp4"
            autoPlay muted loop
            playsInline
            webkit-playsinline="true"
            x5-playsinline="true"
            x5-video-player-type="h5"
            x5-video-player-fullscreen="false"
            preload="auto"
          />
        </div>
      );

    function getReply(msg) {
      const t = msg.toLowerCase();
      let pool = AI_POOLS.default;
      if (/stress|overwhelm|exam|homework|deadline|grade/.test(t)) pool = AI_POOLS.stress;
      else if (/anxi|nervous|worry|panic/.test(t))               pool = AI_POOLS.anxiety;
      else if (/sad|depress|cry|hopeless|alone|empty/.test(t))   pool = AI_POOLS.sad;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    /* ─── INSIGHTS SCREEN ─────────────────────────────────────────────────── */
    function InsightsScreen({ history, openCheckin }) {
      const [selDay, setSelDay] = useState(null);
      const now      = new Date();
      const todayD   = now.getDate();
      const curMon   = MONTHS[now.getMonth()];
      const daysInMon = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const firstDow  = new Date(now.getFullYear(), now.getMonth(), 1).getDay();

      // map day → full entry for this month
      const dayMap = {};
      history.forEach(h => { if(h.mon === curMon && !dayMap[h.day]) dayMap[h.day] = h; });

      const loggedThisMon = Object.keys(dayMap).length;
      const avg = history.length
        ? (history.reduce((a,b)=>a+b.val,0)/history.length).toFixed(1) : '—';

      const cells = [];
      for(let i=0;i<firstDow;i++) cells.push({blank:true});
      for(let d=1;d<=daysInMon;d++) cells.push({day:d, entry:dayMap[d]||null, today:d===todayD});

      const handleCellClick = (c) => {
        if(c.entry) {
          setSelDay(selDay === c.day ? null : c.day);
        } else if(c.day <= todayD) {
          openCheckin();
        }
      };

      const selEntry = selDay ? dayMap[selDay] : null;

      return (
        <div className="screen">
          <div className="scr-header">
            <div className="scr-title">Your Journey</div>
          </div>

          <div className="stats-row">
            {[{n:avg,l:'Avg Mood'},{n:history.length,l:'Entries'},{n:'🌱',l:'Growing'}].map((s,i)=>(
              <div key={i} className="glass stat-card"><div className="stat-num">{s.n}</div><div className="stat-lbl">{s.l}</div></div>
            ))}
          </div>

          {history.length > 0 && (
            <div className="glass chart-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
                <div style={{fontSize:'13px',fontWeight:600,color:'var(--deep)'}}>7-Day Mood Trend</div>
                <div className="chart-sub" style={{marginBottom:0}}>tap to see details</div>
              </div>
              <svg width="100%" height="76" viewBox="0 0 280 76" preserveAspectRatio="xMidYMid meet" style={{overflow:'visible'}}>
                {history.slice(0,7).reverse().map((h,i) => {
                  const slots = Math.min(history.length, 7);
                  const slotW = 280 / slots;
                  const x = i * slotW + slotW * 0.18;
                  const barW = slotW * 0.52;
                  const barH = Math.max(8, (h.val / 5) * 52);
                  const y = 58 - barH;
                  const color = h.val >= 4
                    ? 'rgba(80,155,95,0.68)'
                    : h.val === 3
                      ? 'rgba(190,155,60,0.68)'
                      : 'rgba(200,90,70,0.68)';
                  return (
                    <g key={i}>
                      <rect x={x} y={y} width={barW} height={barH} rx="5" fill={color}/>
                      <text x={x + barW/2} y="72" textAnchor="middle" fontSize="8.5"
                        fill="rgba(44,42,36,0.42)"
                        fontFamily="'Jost',system-ui,sans-serif" fontWeight="500">
                        {h.mon.slice(0,1)}{h.day}
                      </text>
                      <text x={x + barW/2} y={y - 3} textAnchor="middle" fontSize="12">
                        {h.emoji}
                      </text>
                    </g>
                  );
                })}
              </svg>
            </div>
          )}

              <div>
                <div className="cal-title">{now.toLocaleString('en-US',{month:'long'})} {now.getFullYear()}</div>
                <div className="cal-count">{loggedThisMon}/{daysInMon} moods logged</div>

            </div>
            <div className="cal-dow">

            <div className="cal-grid">
              {cells.map((c,i)=>(
                c.blank
                  ? <div key={i} className="cal-cell empty"/>
                  : <div key={i}
                      className={`cal-cell${c.today?' today':''}${c.entry?' has-entry':''}${selDay===c.day?' selected':''}`}
                      onClick={()=>handleCellClick(c)}>
                      {c.entry ? c.entry.emoji : c.day}
                    </div>
              ))}
            </div>

            {selEntry && (
              <div className="day-detail" key={selDay}>
                <div className="day-detail-emoji">{selEntry.emoji}</div>
                <div className="day-detail-info">
                  <div className="day-detail-date">{curMon} {selEntry.day}, {now.getFullYear()}</div>
                  <div className="day-detail-label">{selEntry.label}</div>
                  <div className="day-detail-tags">{selEntry.tags}</div>
                  {selEntry.note && <div className="day-detail-note">"{selEntry.note}"</div>}
                </div>
              </div>
            )}
          </div>

          <div className="sec-label">Recent Entries</div>
          <div className="history-list">
            {history.map((h,i)=>(
              <div key={i} className="glass hist-row">
                <div className="hist-date"><div className="hist-d">{h.day}</div><div className="hist-m">{h.mon}</div></div>
                <div className="hist-emoji">{h.emoji}</div>
                <div className="hist-info"><div className="hist-name">{h.label}</div><div className="hist-tags">{h.tags}</div></div>
              </div>
            ))}
          </div>
        </div>
      );
    }

                <div className="ai-action-row" style={{marginTop:'auto'}}>
                  <div className="ai-action-pill" onClick={()=>startChat('I want to try a breathing exercise')}>
                    <span className="pill-ic">🫁</span> Breathing mode
                  </div>
                  <div className="ai-action-pill" onClick={()=>startChat('Generate a wellness report for me')}>
                    <span className="pill-ic">📊</span> Weekly report
                  </div>
                </div>
              </div>
            </div>

            {/* Quick start pills + input — anchored to bottom together */}
            <div className="ai-bottom-anchor">
              <div style={{padding:'0 18px 6px', fontSize:'10.5px', fontWeight:600, letterSpacing:'.5px', textTransform:'uppercase', color:'var(--deep-40)'}}>Start a conversation</div>
              <div className="ai-qs-row">
                {QUICK_STARTS.map((q,i)=>(
                  <div key={i} className="ai-qs-pill" onClick={()=>startChat(`I ${q.name.toLowerCase()}`)}>
                    {q.name}
                  </div>
                ))}
              </div>
              <div className="ai-bottom-bar">
                <div className="ai-bottom-plus">+</div>
                <input className="ai-bottom-input" placeholder="Ask IlliniCare something…"
                  value={landInp} onChange={e=>setLandInp(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&landSend()} />
                <div className="ai-bottom-send" onClick={landSend}>✦</div>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="screen-chat">
          <div className="scr-header" style={{paddingBottom:12, flexShrink:0}}>
            <div className="back-btn" onClick={()=>setMode('landing')}>{IC.back()}</div>
            <div className="chat-head-title">
              <div className="cht-main">AI Support</div>
              <div className="cht-sub">🟢 Always available · Confidential</div>
            </div>
          </div>

          <div className="msgs-wrap">
            <div className="msgs-inner">
              {msgs.map((m,i)=><div key={i} className={`bubble ${m.from}`}>{m.text}</div>)}
              {typing && <div className="bubble bot"><div className="typing-ind"><div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/></div></div>}
              <div ref={endRef}/>
            </div>
          </div>

          <div className="crisis-banner">
            <span style={{fontSize:15}}>🆘</span>
            <span className="crisis-banner-text">In immediate danger? Reach out now.</span>
            <span className="crisis-banner-link" onClick={toCrisis}>Crisis →</span>
          </div>

          <div className="input-bar">
            <input className="chat-inp" placeholder="Share what's on your mind…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
            <button className="send-btn" onClick={send}>{IC.send(16,'rgba(255,255,255,.92)')}</button>
          </div>
        </div>
      );
    }

    /* ─── PROFILE SCREEN ─────────────────────────────────────────────────── */
    function ProfileScreen({ nav, history, openCheckin }) {
      const avg = history.length
        ? (history.reduce((a,b)=>a+b.val,0)/history.length).toFixed(1) : '—';

      // streak calc
      const streak = (() => {
        if (!history.length) return 0;
        const MON = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
        const now = new Date(); const yr = now.getFullYear();
        const unique = [...new Set(history.map(h => new Date(yr, MON[h.mon]||0, h.day).toDateString()))];
        let count = 0, d = new Date(now);
        while (unique.includes(d.toDateString())) { count++; d.setDate(d.getDate()-1); }
        return count;
      })();

      const MENU_ITEMS = [
        { section: 'Wellness', rows: [
          { ic:'🌸', bg:'rgba(255,180,180,0.20)', title:'Mood History',       sub:'View all your past entries',      chev:true },
          { ic:'🔔', bg:'rgba(255,200,100,0.20)', title:'Reminders',          sub:'Daily check-in at 9:00 PM',       chev:true },
          { ic:'🎯', bg:'rgba(100,180,255,0.20)', title:'Wellness Goals',     sub:'3 active goals this month',       chev:true },
        ]},
        { section: 'Account', rows: [
          { ic:'🔒', bg:'rgba(140,200,140,0.20)', title:'Privacy & Data',     sub:'Control what you share',          chev:true },
          { ic:'🎓', bg:'rgba(200,160,255,0.20)', title:'University',         sub:'University of Illinois · UIUC',   chev:true },
          { ic:'❓', bg:'rgba(200,200,200,0.20)', title:'Help & Support',     sub:'FAQs, contact, feedback',         chev:true, badge:'2' },
        ]},
      ];

      return (
        <div className="screen">
          {/* Hero */}
          <div className="prof-hero fade-up d1">
            <div className="prof-avatar-wrap">
              <div className="prof-avatar">🧑</div>
              <div className="prof-edit-btn">✎</div>
            </div>
            <div className="prof-name">Alex</div>
            <div className="prof-email">alex@illinois.edu</div>
            <div className="prof-badges">
              <span className="prof-badge green">🌱 {streak}d streak</span>
              <span className="prof-badge amber">⭐ {history.length} entries</span>
              <span className="prof-badge blue">🎓 Junior · CS</span>
            </div>
          </div>

          {/* Stats */}
          <div className="prof-stats-row fade-up d2">
            <div className="prof-stat">
              <div className="prof-stat-n">{avg}</div>
              <div className="prof-stat-l">Avg Mood</div>
            </div>
            <div className="prof-stat">
              <div className="prof-stat-n">{streak}</div>
              <div className="prof-stat-l">Day Streak</div>
            </div>
            <div className="prof-stat">
              <div className="prof-stat-n">{history.length}</div>
              <div className="prof-stat-l">Check-ins</div>
            </div>
            <div className="prof-stat">
              <div className="prof-stat-n">🌱</div>
              <div className="prof-stat-l">Growing</div>
            </div>
          </div>

          {/* Menu sections */}
          {MENU_ITEMS.map((sec, si) => (
            <div key={si} className="fade-up" style={{animationDelay:`${(si+3)*0.06}s`}}>
              <div className="prof-section-title">{sec.section}</div>
              <div className="prof-menu">
                {sec.rows.map((r, ri) => (
                  <div key={ri} className={`prof-row${ri===0?' prof-row-first':''}${ri===sec.rows.length-1?' prof-row-last':''}`}
                    onClick={r.title==='Mood History' ? ()=>nav('insights') : undefined}>
                    <div className="prof-row-ic" style={{background:r.bg}}>{r.ic}</div>
                    <div className="prof-row-body">
                      <div className="prof-row-title">{r.title}</div>
                      <div className="prof-row-sub">{r.sub}</div>
                    </div>
                    {r.badge && <span className="prof-row-badge">{r.badge} new</span>}
                    {r.chev && <span className="prof-row-chev">›</span>}
                  </div>
                ))}
              </div>
            </div>
          ))}

          {/* Sign out */}
          <button className="prof-signout fade-up d6">Sign Out</button>
        </div>
      );
    }

    /* ─── RESOURCES SCREEN ────────────────────────────────────────────────── */
    function ResourcesScreen() {
      const [filter, setFilter] = useState('all');
      const cats = ['all','counseling','health','crisis','wellness'];
      const list = filter==='all' ? RESOURCES : RESOURCES.filter(r=>r.cat===filter);
      return (
        <div className="screen">
          <div className="scr-header"><div className="scr-title">Resources</div></div>
          <div className="filter-bar">
            {cats.map(c=><button key={c} className={`chip ${filter===c?'on':''}`} onClick={()=>setFilter(c)}>{c.charAt(0).toUpperCase()+c.slice(1)}</button>)}
          </div>
          <div className="res-list">
            {list.map((r,i)=>(
              <div key={i} className="glass res-card">
                <div className="res-row">
                  <div className="res-ic" style={{background:r.bg}}>{r.icon}</div>
                  <div style={{flex:1}}>
                    <div className="res-name">{r.name}</div>
                    <div className="res-desc">{r.desc}</div>
                    <div className="res-contact">{IC.phone(12,'var(--deep-60)')}{r.contact}</div>
                    <div className="res-hours">{r.hours}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ─── CRISIS SCREEN ───────────────────────────────────────────────────── */
    function CrisisScreen({ nav }) {
      return (
        <div className="screen">
          <div className="scr-header" style={{paddingBottom:4}}>
            <div className="back-btn" onClick={()=>nav('home')}>{IC.back()}</div>
            <div style={{flex:1,marginLeft:12}}>
              <div className="cht-main">Crisis Support</div>
              <div className="cht-sub">Immediate help · always available</div>
            </div>
          </div>

          <div className="glass-hi crisis-hero">
            <div className="crisis-big-ic">🌸</div>
            <div className="crisis-title">You're not alone.</div>
            <div className="crisis-sub">If you're in immediate distress or having thoughts of self-harm, please reach out right now. Help is here 24 / 7.</div>
            <button className="call-now-btn">{IC.phone(20,'white')} Call 988 Now</button>
          </div>

          <div className="sec-label">Emergency Resources</div>
          <div className="crisis-list">
            {[
              {ic:'🏥',bg:'rgba(100,165,120,.24)',name:'CAPS Crisis Line',       det:'(217) 333-3704 · After-hours available',action:'Call'},
              {ic:'💬',bg:'rgba(100,142,202,.24)',name:'Crisis Text Line',        det:'Text HOME to 741741',                   action:'Text'},
              {ic:'🚨',bg:'rgba(218,98,78,.24)',  name:'988 Lifeline',            det:'Call or text 988 · 24/7 nationwide',    action:'Call'},
              {ic:'🚑',bg:'rgba(178,148,78,.24)', name:'UIUC Emergency',          det:'University Police: (217) 333-1216',     action:'Call'},
              {ic:'🏃',bg:'rgba(138,118,182,.24)',name:'McKinley Walk-in',        det:'1109 S Lincoln Ave · 8am–5pm',          action:'Map'},
            ].map((r,i)=>(
              <div key={i} className="glass cr-row">
                <div className="cr-ic" style={{background:r.bg}}>{r.ic}</div>
                <div><div className="cr-name">{r.name}</div><div className="cr-det">{r.det}</div></div>
                <button className="cr-act">{r.action}</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ─── ROOT APP ────────────────────────────────────────────────────────── */
    const NAV_TABS = [
      {id:'home',      icon:'🏠',  label:'Home'},
      {id:'insights',  icon:'📈',  label:'Insights'},
      {id:'ai-chat',   icon:'💬',  label:'AI Chat'},
      {id:'resources', icon:'📚',  label:'Resources'},
      {id:'profile',   icon:'🧑',  label:'Profile'},
    ];

    function App() {
      const [screen,       setScreen]  = useState('home');
      const [tab,          setTab]     = useState('home');
      const [showCheckin,  setCheckin] = useState(false);
      const [history,      setHistory] = useState(loadHistory);

      const nav = s => {
        setScreen(s);
        const tabId = ['home','insights','ai-chat','resources','profile'].includes(s) ? s : tab;
        setTab(tabId);
      };

      const addEntry = ({mood, tags, note}) => {
        if (!mood) return;
        const now = new Date();
        const entry = {
          day:   now.getDate(),
          mon:   MONTHS[now.getMonth()],
          emoji: mood.emoji,
          label: mood.label,
          tags:  tags.length ? tags.join(' · ') : 'General',
          val:   mood.val,
          note:  note || '',
        };
        const updated = [entry, ...history];
        setHistory(updated);
        try { localStorage.setItem('illinicare_history', JSON.stringify(updated)); } catch(e) {}
      };

      const hideNav = screen === 'crisis';

      return (
        <div className="phone">
          {/* ── Grainient WebGL background ── */}
          <VideoBg/>

          {/* ── Shell ── */}
          <div className="shell">
            <StatusBar/>

            <div className="screens">
              {screen==='home'      && <HomeScreen      nav={nav} openCheckin={()=>setCheckin(true)} history={history}/>}
              {screen==='insights'  && <InsightsScreen history={history} openCheckin={()=>setCheckin(true)}/>}
              {screen==='ai-chat'   && <AIChatScreen    nav={nav} toCrisis={()=>nav('crisis')}/>}
              {screen==='resources' && <ResourcesScreen/>}
              {screen==='profile'   && <ProfileScreen   nav={nav} history={history} openCheckin={()=>setCheckin(true)}/>}
              {screen==='crisis'    && <CrisisScreen    nav={nav}/>}
            </div>

            {!hideNav && (
              <div className="bottom-nav">
                {NAV_TABS.map(t=>(
                  <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>nav(t.id)}>
                    <span className="nav-emoji">{t.icon}</span>
                    <span className="nav-label">{t.label}</span>
                    <span className="nav-dot"/>
                  </button>
                ))}
              </div>
            )}

            {showCheckin && (
              <CheckinSheet
                onClose={()=>setCheckin(false)}
                onSave={d=>{ addEntry(d); setCheckin(false); }}
              />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
