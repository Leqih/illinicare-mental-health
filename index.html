<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MindCare · Mental Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #ddd7ce;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sofia Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 24px 0;
    }
    @media (max-width: 430px) {
      body { padding: 12px 0; align-items: flex-start; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: none; }
    }
    /* Cloud character animations */
    @keyframes cloudSad {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes cloudGood {
      0%, 100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-14px) scale(1.04); }
      60%      { transform: translateY(-4px) scale(0.98); }
    }
    @keyframes cloudExhausted {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30%      { transform: translateY(3px) rotate(-2deg); }
      70%      { transform: translateY(3px) rotate(2deg); }
    }
    @keyframes tearFall {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      80%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(28px) scaleY(1.4); }
    }
    @keyframes eyeIdle {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.15); }
    }
    @keyframes moodFadeIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideFromRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideFromLeft {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    @keyframes slideOutToRight {
      from { transform: translateX(0); }
      to   { transform: translateX(100%); }
    }
  </style>
</head>

    const LOG_WAVE_BARS = [

      {h:52,c:'#eafaff'},{h:52,c:'#eafaff'},{h:52,c:'#eafaff'},{h:63,c:'#eafaff'},
      {h:75,c:'#e4f9ff'},{h:88,c:'#e4f9ff'},{h:101,c:'#e4f9ff'},
      {h:115,c:'#daf6ff'},{h:124,c:'#daf6ff'},
      {h:135,c:'#c7ecf7'},
      {h:157,c:'#91e4fb'},
      {h:135,c:'#c7ecf7'},
      {h:124,c:'#daf6ff'},{h:115,c:'#daf6ff'},
      {h:101,c:'#e4f9ff'},{h:88,c:'#e4f9ff'},{h:75,c:'#e4f9ff'},
      {h:63,c:'#eafaff'},{h:52,c:'#eafaff'},{h:52,c:'#eafaff'},{h:52,c:'#eafaff'},
      {h:52,c:'white'},{h:52,c:'white'},{h:52,c:'white'},{h:52,c:'white'},
    ];
    const LOG_MOOD_OPTIONS = ['Exhausted','Sad','Good'];

    function LogMoodPage({ onBack, onSave }) {
      const [selected, setSelected] = useState('Sad');
      const [prevMood, setPrevMood]  = useState(null);   // slides out
      const [slideDir, setSlideDir]  = useState(null);   // 'left' | 'right'
      const dragRef  = useRef({ startX:0, dragging:false });
      const timerRef = useRef(null);

      const switchMood = (mood) => {
        if (mood === selected) return;
        const oldIdx = LOG_MOOD_OPTIONS.indexOf(selected);
        const newIdx = LOG_MOOD_OPTIONS.indexOf(mood);
        if (timerRef.current) clearTimeout(timerRef.current);
        setPrevMood(selected);
        setSlideDir(newIdx > oldIdx ? 'left' : 'right');
        setSelected(mood);
        timerRef.current = setTimeout(() => setPrevMood(null), 420);
      };

      /* ── Per-mood helpers ── */
      const moodBgFilter = (id) =>
        id==='Good' ? 'hue-rotate(240deg) saturate(0.9)' :
        id==='Sad'  ? 'hue-rotate(0deg)' : 'hue-rotate(30deg) saturate(0.55) brightness(1.05)';

      /* Solid fallback color — always opaque even if images fail to load */
      const moodBgColor = (id) =>
        id==='Good' ? '#c8eea8' : id==='Sad' ? '#c2e4f5' : '#cec8f0';

      const renderSlot = (moodId) => {
        const mg = moodId==='Good', ms = moodId==='Sad';
        const ci = mg ? imgGoodChar : imgLogCloudChar;
        const cf = mg ? 'none' : !ms ? 'saturate(0.2) brightness(0.85) hue-rotate(250deg)' : 'none';
        const ca = mg ? 'cloudGood 1.6s cubic-bezier(.36,.07,.19,.97) infinite' :
                   !ms  ? 'cloudExhausted 5s ease-in-out infinite' : 'cloudSad 3s ease-in-out infinite';
        const ec = mg ? null : ms ? '#58c2ff' : '#9090b0';
        const esy = !ms && !mg ? 0.45 : 1;
        const bi = mg ? imgGoodBubble : imgLogBubble;
        const bws = mg
          ? { background:'linear-gradient(-1.89deg,rgb(164,217,156) 36.791%,rgb(109,189,44) 107.79%)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }
          : ms ? { color:'#47d9ff' } : { color:'#a090d0' };
        return (
          <>
            {/* Bubble */}
            <div style={{ position:'absolute', left:'50%', marginLeft:-85, top:22, width:170, height:78 }}>
              <div style={{ position:'absolute', top:0, right:0, bottom:'12.86%', left:0 }}>
                <img alt="" style={{ display:'block', maxWidth:'none', width:'100%', height:'100%' }} src={bi}
                  onError={e=>{ e.target.style.display='none'; const p=e.target.parentNode; p.style.background='white'; p.style.borderRadius='18px'; p.style.boxShadow='0 2px 12px rgba(0,0,0,0.08)'; }} />
              </div>
              <p style={{ position:'absolute', left:'50%', transform:'translateX(-50%)', fontFamily:'Sofia Sans,sans-serif', fontWeight:500, fontSize:24, color:'black', textAlign:'center', top:14, letterSpacing:'0.3px', whiteSpace:'nowrap', width:136 }}>
                {'I feel '}<span style={bws}>{moodId}</span>{' !'}
              </p>
            </div>
            {/* Character */}
            <div style={{ position:'absolute', left:'50%', marginLeft:-143.5, top:106, width:287, height:287 }}>
              <div style={{ position:'relative', width:'100%', height:'100%', filter:cf, animation:ca }}>
                <img alt="" style={{ position:'absolute', display:'block', inset:0, maxWidth:'none', width:'100%', height:'100%' }} src={ci} onError={e=>e.target.style.display='none'} />
                {mg && <div style={{ position:'absolute', height:48, left:97, top:131, width:92 }}><div style={{ position:'absolute', top:0, right:0, bottom:'-15.63%', left:0 }}><img alt="" style={{ display:'block', maxWidth:'none', width:'100%', height:'100%' }} src={imgGoodFace} onError={e=>e.target.style.display='none'} /></div></div>}
                {ec && <>
                  <div style={{ position:'absolute', background:ec, height:11, left:183, borderRadius:20, top:133, width:21, transform:`scaleY(${esy})`, transformOrigin:'center', animation:'eyeIdle 4s ease-in-out 0.3s infinite' }} />
                  <div style={{ position:'absolute', background:ec, height:11, left:82,  borderRadius:20, top:133, width:21, transform:`scaleY(${esy})`, transformOrigin:'center', animation:'eyeIdle 4s ease-in-out 0.5s infinite' }} />
                </>}
                {ms && <>
                  <div style={{ position:'absolute', width:5, height:9, borderRadius:'50% 50% 50% 50% / 40% 40% 60% 60%', background:'#58c2ff', left:89,  top:148, animation:'tearFall 2s ease-in 0s   infinite' }} />
                  <div style={{ position:'absolute', width:5, height:9, borderRadius:'50% 50% 50% 50% / 40% 40% 60% 60%', background:'#58c2ff', left:89,  top:148, animation:'tearFall 2s ease-in 1s   infinite' }} />
                  <div style={{ position:'absolute', width:5, height:9, borderRadius:'50% 50% 50% 50% / 40% 40% 60% 60%', background:'#58c2ff', left:192, top:148, animation:'tearFall 2s ease-in 0.5s infinite' }} />
                  <div style={{ position:'absolute', width:5, height:9, borderRadius:'50% 50% 50% 50% / 40% 40% 60% 60%', background:'#58c2ff', left:192, top:148, animation:'tearFall 2s ease-in 1.5s infinite' }} />
                </>}
              </div>
            </div>
          </>
        );
      };

      /* Drag/swipe — attach a non-passive touchmove to block browser scroll */
      const waveRef = useRef(null);
      useEffect(() => {
        const el = waveRef.current;
        if (!el) return;
        const prevent = (e) => { if (dragRef.current.dragging) e.preventDefault(); };
        el.addEventListener('touchmove', prevent, { passive: false });
        return () => el.removeEventListener('touchmove', prevent);
      }, []);

      const onDragStart = (e) => {
        const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
        dragRef.current = { startX: x, dragging: true };
      };
      const onDragMove  = (e) => {
        if (!dragRef.current.dragging) return;
        const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
        const dx = x - dragRef.current.startX;
        if (Math.abs(dx) > 48) {
          const idx = LOG_MOOD_OPTIONS.indexOf(selected);
          if (dx < 0 && idx < LOG_MOOD_OPTIONS.length - 1) switchMood(LOG_MOOD_OPTIONS[idx + 1]);
          else if (dx > 0 && idx > 0) switchMood(LOG_MOOD_OPTIONS[idx - 1]);
          dragRef.current.dragging = false;
        }
      };
      const onDragEnd = () => { dragRef.current.dragging = false; };

      const isGood = selected==='Good', isSad = selected==='Sad';
      const pillShadow = isGood ? '#90d870' : isSad ? '#91e4fb' : '#c0b0e8';
      const inAnim  = slideDir==='left'  ? 'slideFromRight 0.4s cubic-bezier(0.25,0.46,0.45,0.94) both' :
                      slideDir==='right' ? 'slideFromLeft  0.4s cubic-bezier(0.25,0.46,0.45,0.94) both' : 'none';
      const outAnim = slideDir==='left'  ? 'slideOutToLeft  0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards' :
                      slideDir==='right' ? 'slideOutToRight 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards' : 'none';

      return (
        <div style={{ position:'absolute', inset:0, zIndex:200, borderRadius:'inherit' }}>

          {/* ── Background: NEVER has filter on this div → always fully opaque ── */}
          <div style={{ position:'absolute', inset:0, background:'white', overflow:'hidden', borderRadius:'inherit' }}>
            {/* Ellipse 1 – filter applied here, not on parent */}
            <div style={{ position:'absolute', height:638, left:-38, top:81, width:476,
              filter: moodBgFilter(selected), transition:'filter 0.42s cubic-bezier(0.25,0.46,0.45,0.94)', willChange:'filter' }}>
              <div style={{ position:'absolute', top:'-55.87%', right:'-74.98%', bottom:'-55.87%', left:'-74.98%' }}>
                <img alt="" style={{ display:'block', maxWidth:'none', width:'100%', height:'100%' }} src={imgLogEllipse1} onError={e=>e.target.style.display='none'} />
              </div>
            </div>
            {/* Ellipse 5 – filter applied on the inner rotate div, outside the color-burn container */}
            <div style={{ position:'absolute', display:'flex', height:1136, alignItems:'center', justifyContent:'center', left:-306, mixBlendMode:'color-burn', top:-25, width:1136 }}>
              <div style={{ transform:'rotate(145.14deg)',
                filter: moodBgFilter(selected), transition:'filter 0.42s cubic-bezier(0.25,0.46,0.45,0.94)', willChange:'filter' }}>
                <div style={{ height:816, position:'relative', width:816 }}>
                  <div style={{ position:'absolute', top:'-6.56%', right:'-6.55%', bottom:'-6.56%', left:'-6.55%' }}>
                    <img alt="" style={{ display:'block', maxWidth:'none', width:'100%', height:'100%' }} src={imgLogEllipse5} onError={e=>e.target.style.display='none'} />
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* ── Sliding zone: overflow:hidden clips characters during transition ── */}
          <div style={{ position:'absolute', top:0, left:0, right:0, height:400, overflow:'hidden' }}>
            {/* Previous mood slides OUT */}
            {prevMood && (
              <div key={'out-'+prevMood} style={{ position:'absolute', inset:0, animation:outAnim, willChange:'transform' }}>
                {renderSlot(prevMood)}
              </div>
            )}
            {/* Current mood slides IN */}
            <div key={'in-'+selected} style={{ position:'absolute', inset:0, animation: prevMood ? inAnim : 'none', willChange:'transform' }}>
              {renderSlot(selected)}
            </div>
          </div>

          {/* ── Bottom sheet ── */}
          <div style={{ position:'absolute', background:'#faf7f5', height:453, left:0, overflow:'hidden', borderRadius:50, top:391, width:390 }}>
            {/* Waveform — drag to switch */}
            <div ref={waveRef}
              onMouseDown={onDragStart} onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
              onTouchStart={onDragStart} onTouchMove={onDragMove} onTouchEnd={onDragEnd}
              style={{ position:'absolute', display:'flex', gap:7, alignItems:'flex-end', left:10, top:184, height:156, cursor:'ew-resize', userSelect:'none', touchAction:'none' }}>
              {LOG_WAVE_BARS.map((bar,i) => (
                <div key={i} style={{ background:bar.c, height:bar.h, borderRadius:20, flexShrink:0, width:6 }} />
              ))}
            </div>
            {/* Title + pills + dots */}
            <div style={{ position:'absolute', left:13, top:27, width:345 }}>
              <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, lineHeight:'normal', fontSize:30, color:'black', textAlign:'center', letterSpacing:'0.3px', width:320, margin:'0 auto' }}>
                HOW do you feeling right now?
              </p>
              <div style={{ display:'flex', gap:12, alignItems:'center', justifyContent:'center', marginTop:24 }}>
                {LOG_MOOD_OPTIONS.map(mood => (
                  <div key={mood} onClick={() => switchMood(mood)}
                    style={{ background:'white', border:'1px solid rgba(20,20,19,0.07)', display:'flex', height:36, alignItems:'center', justifyContent:'center', padding:'0 26px', borderRadius:20,
                      boxShadow: mood===selected ? `0 2px 10.6px 0 ${pillShadow}` : '0 2px 10.6px 0 #d0d0d0',
                      flexShrink:0, cursor:'pointer', userSelect:'none', transition:'box-shadow 0.2s ease' }}>
                    <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, fontSize:14, color:'black', letterSpacing:'-0.2px', whiteSpace:'nowrap' }}>{mood}</p>
                  </div>
                ))}
              </div>
              <div style={{ display:'flex', gap:6, justifyContent:'center', marginTop:12 }}>
                {LOG_MOOD_OPTIONS.map(m => (
                  <div key={m} onClick={() => switchMood(m)} style={{ width:m===selected?18:6, height:6, borderRadius:3, background:m===selected?'#141413':'rgba(20,20,19,0.18)', cursor:'pointer', transition:'all 0.25s ease' }} />
                ))}
              </div>
            </div>
            {/* Submit */}
            <div onClick={() => { onSave(selected); onBack(); }}
              style={{ position:'absolute', background:'#d9d9d9', height:45, left:19, borderRadius:20, top:366, width:352, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, fontSize:16, color:'white', letterSpacing:'-0.2px' }}>Log Mood</p>
            </div>
          </div>

          {/* ── Back button ── */}
          <div onClick={onBack}
            style={{ position:'absolute', left:20, top:56, zIndex:10,
              background: isGood ? 'rgba(164,217,156,0.7)' : !isSad ? 'rgba(180,160,220,0.6)' : 'rgba(255,255,255,0.75)',
              backdropFilter:'blur(8px)', borderRadius:20, padding:'7px 14px', cursor:'pointer',
              border: isGood ? '1px solid rgba(109,189,44,0.25)' : !isSad ? '1px solid rgba(160,144,208,0.3)' : '1px solid rgba(20,20,19,0.08)',
              boxShadow:'0 2px 8px rgba(0,0,0,0.06)', transition:'background 0.4s ease, border 0.4s ease' }}>
            <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, fontSize:13, color:'#141413', letterSpacing:'-0.1px' }}>← Back</p>

          <div style={{ position:'absolute', inset:0, pointerEvents:'none', borderRadius:'inherit', boxShadow:'inset 0px 1px 0px 0px rgba(255,255,255,0.12)' }} />
        </div>
      );

    /* ── APP ── */
    function App() {
      const [page, setPage] = useState('home');
      const [checkinOpen, setCheckin] = useState(false);
      const [todayMood, setTodayMood] = useState(null);
      const [count, setCount] = useState(7);
      const greeting = getGreeting();

      const handleSave = entry => {
        setTodayMood(entry);
        setCount(c => c + 1);
        setCheckin(false);
      };

      const handleLogMoodSave = (moodLabel) => {
        setTodayMood({ mood: { label: moodLabel, emoji: moodLabel==='Good'?'🙂':moodLabel==='Sad'?'😔':'😩' } });
        setCount(c => c + 1);
      };

      /* TODAY face content */
